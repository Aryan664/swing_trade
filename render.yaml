services:
  # Backend Service
  - type: web
    name: swing-trade-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: PORT
        value: 5000

  # Frontend Service (Static Site)
  - type: static
    name: swing-trade-frontend
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://swing-trade-backend.onrender.com
